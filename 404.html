<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var path = location.pathname.replace(/\/$/, "").replace(/^\//, "");
        var routes = {
          projects: "projects/",
          about: "about/",
          contact: "contact/",
        };
        if (routes[path]) {
          location.replace(routes[path] + location.search + location.hash);
        }
      })();
    </script>
    <script>
      (function () {
        var t = localStorage.getItem("portfolio-theme");
        document.documentElement.setAttribute(
          "data-theme",
          t === "light" || t === "dark" ? t : "dark"
        );
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page not found — Grishma Gajurel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@8..144,400;8..144,500&family=Newsreader:opsz,wght@6..72,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  </head>
  <body data-page="home">
    <div id="site-header"></div>
    <main id="main" style="text-align: center; padding-top: 4rem">
      <h1 class="page-header__title">404</h1>
      <p class="page-header__lead">This page does not exist or has moved.</p>
      <p style="margin-top: 2rem">
        <a class="btn btn--primary" href="index.html">Back home</a>
      </p>
    </main>
    <div id="site-footer"></div>
    <script src="js/project-files.js"></script>
    <script src="js/site.js"></script>
  </body>
</html>
