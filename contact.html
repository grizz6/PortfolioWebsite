<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var t = localStorage.getItem("portfolio-theme");
        document.documentElement.setAttribute(
          "data-theme",
          t === "light" || t === "dark" ? t : "dark"
        );
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contact Grishma Gajurel — email, LinkedIn, and GitHub."
    />
    <meta name="author" content="Grishma Gajurel" />
    <meta name="theme-color" content="#121110" />
    <link rel="canonical" href="https://grizz6.github.io/grizgaj/contact.html" />
    <title>Contact — Grishma Gajurel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@8..144,400;8..144,500;8..144,600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  </head>
  <body data-page="contact" class="page-contact">
    <div id="site-header"></div>

    <main id="main" class="contact-page">
      <section class="contact-hero" data-animate="fade-up">
        <div class="contact-hero__visual" aria-hidden="true">
          <span class="contact-hero__ring"></span>
          <span class="contact-hero__ring contact-hero__ring--2"></span>
        </div>
        <h1 class="contact-hero__title">Say hello</h1>
        <p class="contact-hero__sub">Email is best, links below stay open too.</p>
      </section>

      <div class="contact-body">
        <div class="contact-mail-block" data-animate="fade-up" style="--delay: 1">
          <a
            id="contact-email-link"
            class="contact-mail"
            href="mailto:gajurel.grizma@gmail.com"
          >
            <span class="contact-mail__label">Email</span>
            <span id="contact-email-display" class="contact-mail__address"
              >gajurel.grizma@gmail.com</span
            >
            <span class="contact-mail__cta">Open in mail app →</span>
          </a>
          <button type="button" class="contact-copy" id="contact-copy">
            <span class="contact-copy__text">Copy address</span>
            <span class="contact-copy__done" hidden>Copied</span>
          </button>
        </div>

        <p
          class="contact-status"
          id="contact-status"
          data-animate="fade-up"
          style="--delay: 2"
        >
          Ready when you are.
        </p>

        <nav
          id="contact-links"
          class="contact-social"
          aria-label="Profiles"
          data-animate="fade-up"
          style="--delay: 3"
        ></nav>
      </div>
    </main>

    <div id="site-footer"></div>

    <script src="js/site.js"></script>
  </body>
</html>
